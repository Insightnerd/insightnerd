---
layout: default
title: "Contact InsightNerd"
description: "Get in touch with the InsightNerd team."
---

<div class="page-content page-content--narrow">
  <h1>Contact</h1>
  <p>Have a question, suggestion, or want to contribute? Send us a message and we'll get back to you.</p>

  <form class="contact-form" id="contactForm">
    <div class="form-group">
      <label for="contactName">Name</label>
      <input type="text" id="contactName" required aria-label="Your name">
    </div>
    <div class="form-group">
      <label for="contactEmail">Email</label>
      <input type="email" id="contactEmail" required aria-label="Your email address">
    </div>
    <div class="form-group">
      <label for="contactMessage">Message</label>
      <textarea id="contactMessage" rows="5" required aria-label="Your message"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send message</button>
    <p class="form-note" id="contactNote" aria-live="polite"></p>
  </form>
</div>
